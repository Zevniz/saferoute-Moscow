services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://127.0.0.1:8000}"
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      DATABASE_URL: postgresql://saferoute:saferoute_pass@db:5432/saferoute_db
      PHOTON_URL: http://photon:2322
      VALHALLA_URL: http://valhalla:8002
      HTTP_USER_AGENT: "${HTTP_USER_AGENT:-SafeRoute/2.1 self-hosted}"
      CORS_ALLOWED_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
      ALLOW_PUBLIC_SERVICE_FALLBACK: "${ALLOW_PUBLIC_SERVICE_FALLBACK:-false}"
      HEALTH_ROUTE_READINESS: "${HEALTH_ROUTE_READINESS:-true}"
      ROUTE_DATA_VERSION: "${ROUTE_DATA_VERSION:-moscow-oblast-v1}"
      ROUTE_GRAPH_ALGORITHM: "${ROUTE_GRAPH_ALGORITHM:-astar}"
      ROUTE_CACHE_MAX_ENTRIES: "${ROUTE_CACHE_MAX_ENTRIES:-512}"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      photon:
        condition: service_healthy
      valhalla:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://127.0.0.1:8000/api/health?deep=false' | python -c \"import json, sys; sys.exit(0 if json.load(sys.stdin).get('status') == 'ok' else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: pgrouting/pgrouting:15-3.5-3.8
    environment:
      POSTGRES_USER: saferoute
      POSTGRES_PASSWORD: saferoute_pass
      POSTGRES_DB: saferoute_db
    ports:
      - "5434:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saferoute -d saferoute_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  photon:
    image: rtuszik/photon-docker:2.1.1
    environment:
      REGION: russia
      UPDATE_STRATEGY: DISABLED
      PHOTON_LISTEN_IP: 0.0.0.0
    ports:
      - "2322:2322"
    volumes:
      - photon_data:/photon/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider 'http://127.0.0.1:2322/api?q=Москва&limit=1' || exit 1"]
      interval: 45s
      timeout: 10s
      retries: 10

  valhalla:
    image: ghcr.io/nilsnolde/docker-valhalla/valhalla:latest
    environment:
      build_admins: "True"
      build_time_zones: "True"
      build_elevation: "False"
      build_tar: "True"
      serve_tiles: "True"
      server_threads: "2"
      tile_urls: "${VALHALLA_TILE_URLS:-file:///custom_files/osm/moscow-oblast.osm.pbf}"
    ports:
      - "8002:8002"
    volumes:
      - valhalla_data:/custom_files
      - ./data/osm:/custom_files/osm:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://127.0.0.1:8002/status' >/dev/null || exit 1"]
      interval: 45s
      timeout: 10s
      retries: 10

volumes:
  photon_data:
  postgis_data:
  valhalla_data:
